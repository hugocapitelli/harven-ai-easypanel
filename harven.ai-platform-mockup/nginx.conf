server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # React Router - SPA fallback
    # index.html nunca deve ser cacheado (evita chunk 404 após novo deploy)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Hashed assets (JS/CSS com hash no nome) — cache longo, imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Outros assets estáticos (imagens, fontes, etc.)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Nao cachear HTML (fallback explícito para .html direto)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Reverse proxy for uploaded files (logos, images, etc.)
    # Files are stored in the backend container's ./uploads/ directory
    location /uploads/ {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Cache uploaded assets no browser (logos raramente mudam)
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Reverse proxy for API calls (fallback when VITE_API_URL not set at build time)
    # Override API_UPSTREAM at runtime: docker run -e API_UPSTREAM=http://backend:8000
    # EasyPanel: set this to the backend service's internal URL
    location /api/ {
        # Default upstream — overridden by env substitution in entrypoint
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Noto+Sans:wght@300;400;500;600;700&display=swap"

    rel="stylesheet" />
  <script>
    // Initialize Theme
    if (localStorage.getItem('harven-theme') === 'dark' || (!('harven-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
